theme:
  name: material
  language: en
  logo: assets/nalix.png
  favicon: assets/nalix.ico
  font:
    text: Inter
    code: "Fira Code"
  palette:
    - scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.path
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs.sticky
    - navigation.sections
    - header.sticky
    - search.highlight
    - search.suggest 
    - content.action.edit
    - content.action.view
    - content.tabs
    - content.code.copy
    - content.code.annotate
    - content.tooltips

plugins:
  - search:
      separator: '[\s\-\.]+'
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      pygments_lang_class: true
      line_spans: __span
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.inlinehilite
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css
