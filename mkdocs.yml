theme:
  name: material
  language: en
  logo: assets/nalix.png
  favicon: assets/nalix.ico
  font:
    text: Inter
    code: "Fira Code"
  palette:
    - scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - header.sticky
    - search.highlight
    - content.action.edit
    - content.tabs
    - content.code.copy

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.highlight:
      guess_lang: false
      anchor_linenums: true
      pygments_lang_class: true
      line_spans: __span
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.inlinehilite
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css
