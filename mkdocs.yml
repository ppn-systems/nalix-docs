site_name: Nalix
site_description: High-performance real-time server framework for .NET
site_url: https://ppn-systems.github.io/nalix-docs/
copyright: Copyright © 2025-2026 PPN Corporation

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ppn-systems/nalix
    - icon: fontawesome/brands/facebook
      link: https://facebook.com/ppn.system
    - icon: fontawesome/solid/envelope
      link: mailto:ppn.system@gmail.com

nav:
  - Overview: index.md
  - Getting Started:
      - Introduction: getting-started.md
      - Installation: installation.md
  - Your First App: quickstart.md
  - Core Concepts:
      - Architecture: concepts/architecture.md
      - Real-time Engine: concepts/real-time.md
      - Middleware Pipeline: concepts/middleware.md
  - Packages:
      - Nalix.SDK: packages/nalix-sdk.md
      - Nalix.Network: packages/nalix-network.md
      - Nalix.Common: packages/nalix-common.md
      - Nalix.Logging: packages/nalix-logging.md
      - Nalix.Framework: packages/nalix-framework.md
  - API Reference:
      - Overview: api/overview.md
      - Server: api/server.md
      - Client: api/client.md
      - Shared Contracts: api/shared.md
      - Security & Policies: api/security.md
  - Guides:
      - Basic Server: guides/basic-server.md
      - Client Connection: guides/client-connection.md

theme:
  name: material
  language: en
  logo: assets/nalix.png
  favicon: assets/nalix.ico
  font:
    text: Inter
    code: "Fira Code"
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - header.sticky
    - navigation.expand
    - search.highlight
    - content.action.edit
    - content.tabs
    - content.code.copy

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.highlight:
      guess_lang: false
      anchor_linenums: true
      pygments_lang_class: true
      line_spans: __span
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.inlinehilite
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css